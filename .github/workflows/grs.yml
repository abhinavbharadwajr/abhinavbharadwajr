name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Ensure profile dir exists
        run: mkdir -p .github/profile

      # Stats - light
      - name: Generate stats card (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&count_private=true&rank_icon=github&hide_border=true&theme=default
          path: .github/profile/stats-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Stats - dark
      - name: Generate stats card (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&count_private=true&rank_icon=github&hide_border=true&theme=tokyonight
          path: .github/profile/stats-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Top Langs - light
      - name: Generate top languages card (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&card_width=340&hide_border=true&theme=default
          path: .github/profile/top-langs-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Top Langs - dark
      - name: Generate top languages card (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&card_width=340&hide_border=true&theme=tokyonight
          path: .github/profile/top-langs-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Pin Card - light
      - name: Generate pin card (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=readme-tools&repo=github-readme-stats
          path: .github/profile/grs-pin-card-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Pin Card - dark
      - name: Generate pin card (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=readme-tools&repo=github-readme-stats
          path: .github/profile/grs-pin-card-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "Abhinav Bharadwaj R"
          git config user.email "abhinavbharadwajr@zohomail.in"
          git add .github/profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
